name: feasta
description: "A catering and event booking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
    
  custom_refresh_indicator: ^4.0.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  cloud_functions: ^6.3.3
  google_sign_in: ^7.2.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  pinput: ^6.0.2
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  rxdart: ^0.28.0
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/mobile_logo.png"
  adaptive_icon_background: "#FF6333"
  adaptive_icon_foreground: "assets/images/mobile_logo.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FF6333"
  image: assets/images/mobile_logo.png

  android: true
  ios: true
  web: true

  fullscreen: true

  android_12:
    color: "#FF6333"
    image: assets/images/mobile_logo.png
